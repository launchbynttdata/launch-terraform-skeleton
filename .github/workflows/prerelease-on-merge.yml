name: Publish Prerelease

on:
  push:
    branches:
      - main

jobs:
  release-candidate-on-merge:
    name: "Create and Publish Prerelease on Merge"
    permissions:
      contents: write
      pull-requests: write
    uses: launchbynttdata/launch-workflows/.github/workflows/reusable-release-on-merge.yml@1864e70e0f3bc5d98ea126b5cc4245ac9573d884
    with:
      prerelease_identifier: "rc"
    secrets: inherit # pragma: allowlist secret

  release-draft-on-merge:
    name: "Draft Release on Merge"
    permissions:
      contents: write
      pull-requests: write
    uses: launchbynttdata/launch-workflows/.github/workflows/reusable-release-on-merge.yml@1864e70e0f3bc5d98ea126b5cc4245ac9573d884
    with:
      publish: false
    secrets: inherit # pragma: allowlist secret
