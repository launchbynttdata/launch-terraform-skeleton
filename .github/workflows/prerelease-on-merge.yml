name: Publish Prerelease

on:
  push:
    branches:
      - main

jobs:
  release-candidate-on-merge:
    name: "Create and Publish Prerelease on Merge"
    permissions:
      contents: write
      pull-requests: write
    uses: launchbynttdata/launch-workflows/.github/workflows/reusable-release-on-merge.yml@5398ca6b022453afbddfc9ed857398588669197b
    with:
      prerelease_identifier: "rc"
    secrets: inherit # pragma: allowlist secret

  release-draft-on-merge:
    name: "Draft Release on Merge"
    permissions:
      contents: write
      pull-requests: write
    uses: launchbynttdata/launch-workflows/.github/workflows/reusable-release-on-merge.yml@5398ca6b022453afbddfc9ed857398588669197b
    with:
      publish: false
    secrets: inherit # pragma: allowlist secret
