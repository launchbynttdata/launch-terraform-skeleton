name: Publish Prerelease

on:
  push:
    branches:
      - main

jobs:
  release-candidate-on-merge:
    name: "Create and Publish Prerelease on Merge"
    permissions:
      contents: write
      pull-requests: write
    uses: launchbynttdata/launch-workflows/.github/workflows/reusable-release-on-merge.yml@088489d7b5f9ee3e0f63110b7fa5a13f7fd523e2
    with:
      prerelease_identifier: "rc"
    secrets: inherit # pragma: allowlist secret

  release-draft-on-merge:
    name: "Draft Release on Merge"
    permissions:
      contents: write
      pull-requests: write
    uses: launchbynttdata/launch-workflows/.github/workflows/reusable-release-on-merge.yml@088489d7b5f9ee3e0f63110b7fa5a13f7fd523e2
    with:
      publish: false
    secrets: inherit # pragma: allowlist secret
